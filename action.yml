name: "Coverage Badge"
description: "Discover coverage reports, generate self-contained SVG badges, and force-push them with the reports to an orphan branch."
author: "kshutkin"
branding:
  icon: "shield"
  color: "green"

inputs:
  branch:
    description: "Orphan branch where badges and coverage reports are force-pushed."
    required: false
    default: "coverage"
  coverage-paths:
    description: "Comma- or newline-separated globs that match coverage folders to process."
    required: false
    default: "**/coverage"
  ignore:
    description: "Comma- or newline-separated globs to exclude during discovery."
    required: false
    default: "**/node_modules/**"
  metric:
    description: "Which metric to display on the badge: lines, statements, branches, or functions."
    required: false
    default: "branches"
  label:
    description: "Left-side label text on the badge."
    required: false
    default: "coverage"
  thresholds:
    description: "Comma-separated upper-bound:color pairs sorted ascending. The first bucket whose upper bound is greater than the percentage wins."
    required: false
    default: "50:red,60:orange,70:yellow,80:yellowgreen,90:green,100:brightgreen"
  precision:
    description: "Number of decimal places shown on the percentage."
    required: false
    default: "0"
  style:
    description: "Badge style. Only 'flat' is supported in v1."
    required: false
    default: "flat"
  commit-message:
    description: "Commit message used when pushing to the orphan branch."
    required: false
    default: "chore: update coverage badges"
  commit-user-name:
    description: "Git user.name used for the commit."
    required: false
    default: "github-actions[bot]"
  commit-user-email:
    description: "Git user.email used for the commit."
    required: false
    default: "41898282+github-actions[bot]@users.noreply.github.com"
  token:
    description: "GitHub token with contents:write permission used to push the orphan branch."
    required: false
    default: ${{ github.token }}
  dry-run:
    description: "If 'true', generate badges into a temp dir but skip the git push step."
    required: false
    default: "false"

outputs:
  branch:
    description: "The branch the badges were pushed to."
  commit-sha:
    description: "SHA of the commit pushed to the orphan branch (empty when dry-run or nothing to commit)."
  badges-json:
    description: "JSON array of generated badges: [{path, metric, pct, color}]."

runs:
  using: "node20"
  main: "src/main.js"
